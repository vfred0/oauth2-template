version: "3.9"

services:
  # ------------------------------------------------------------
  # POSTGRESQL (KEYCLOAK)
  # ------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      POSTGRES_DB: keycloak
    ports:
      - "5432:5432"
    volumes:
      - postgres-keycloak-data:/var/lib/postgresql/data

  # ------------------------------------------------------------
  # POSTGRESQL (APPLICATION DB)
  # ------------------------------------------------------------
  postgres-app:
    image: postgres:16
    container_name: postgres-app
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
      POSTGRES_DB: appdb
    ports:
      - "5433:5432"
    volumes:
      - postgres-app-data:/var/lib/postgresql/data

  # ------------------------------------------------------------
  # KEYCLOAK
  # ------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json

  # ------------------------------------------------------------
  # JWT DEMO APPLICATION
  # ------------------------------------------------------------
  jwt-demo:
    container_name: jwt-demo
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: local
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-app:5432/appdb
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: ${APP_DB_PASSWORD}
      KEYCLOAK_RESOURCE_CLIENT_ID: ${KEYCLOAK_RESOURCE_CLIENT_ID}
      KEYCLOAK_RESOURCE_CLIENT_SECRET: ${KEYCLOAK_RESOURCE_CLIENT_SECRET}

      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      MANAGEMENT_OTLP_LOGGING_ENDPOINT: http://otel-collector:4318/v1/logs
      OTEL_RESOURCE_ATTRIBUTES: service.name=jwt-demo,service.namespace=jwt-demo,deployment.environment=local
    depends_on:
      - keycloak
      - postgres-app
      - otel-collector

  # ------------------------------------------------------------
  # OPEN TELEMETRY COLLECTOR
  # ------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    container_name: otel-collector
    command: ["--config=/etc/otel.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./otel.yaml:/etc/otel.yaml

  # ------------------------------------------------------------
  # TEMPO (TRACE STORAGE)
  # ------------------------------------------------------------
  tempo:
    image: grafana/tempo:2.4.1
    container_name: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
      - tempo-data:/tmp/tempo

  # ------------------------------------------------------------
  # LOKI (LOG STORAGE)
  # ------------------------------------------------------------
  loki:
    image: grafana/loki:2.8.2
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    user: "0"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
      - loki-wal:/wal


  # ------------------------------------------------------------
  # PROMETHEUS (METRICS)
  # ------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus

  # ------------------------------------------------------------
  # GRAFANA (UI)
  # ------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.2.3
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - tempo
      - prometheus
      - loki
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning

volumes:
  postgres-keycloak-data:
  postgres-app-data:
  tempo-data:
  prometheus-data:
  grafana-data:
  loki-data:
  loki-wal:
