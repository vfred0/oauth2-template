receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  otlp:
    endpoint: tempo:4317
    tls:
      insecure: true
  loki:
    endpoint: http://loki:3100/loki/api/v1/push

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64
  batch:
    timeout: 2s
    send_batch_size: 1024
  resource/logs:
    attributes:
      - action: upsert
        key: service.name
        value: jwt-demo
      - action: upsert
        key: loki.resource.labels
        value: service.name,service.namespace,service.instance.id
      - action: upsert
        key: loki.attribute.labels
        value: level,logger_name,traceId,spanId

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource/logs, batch]
      exporters: [loki]
