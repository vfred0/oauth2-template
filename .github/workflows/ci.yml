name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and verify
        run: mvn -B -ntp verify

      - name: Unit Test Summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Tests (JUnit)
          path: target/surefire-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Integration Test Summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Integration Tests (JUnit)
          path: target/failsafe-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: false

      - name: SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
        run: >-
          mvn -B -ntp sonar:sonar
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.projectKey=${SONAR_PROJECT_KEY}
          -Dsonar.organization=${SONAR_ORGANIZATION}
          -Dsonar.junit.reportPaths=target/surefire-reports,target/failsafe-reports

      - name: Upload JUnit XML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-xml-reports
          path: |
            target/surefire-reports/*.xml
            target/failsafe-reports/*.xml
          if-no-files-found: warn

      - name: Upload JaCoCo IT report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-it-report
          path: target/site/jacoco-it
          if-no-files-found: warn
