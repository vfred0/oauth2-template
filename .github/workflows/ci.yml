name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and verify
        run: mvn -B -ntp verify

      - name: Test Summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: JUnit Test Summary
          path: |
            target/surefire-reports/*.xml
            target/failsafe-reports/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Validate SonarCloud vars
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
        run: |
          if [ -z "${SONAR_PROJECT_KEY}" ] || [ -z "${SONAR_ORGANIZATION}" ] || [ -z "${SONAR_TOKEN}" ]; then
            echo "Missing SonarCloud vars/secret. Set SONAR_PROJECT_KEY, SONAR_ORGANIZATION, SONAR_TOKEN."
            exit 1
          fi

      - name: SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
        run: >-
          mvn -B -ntp sonar:sonar
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.projectKey=${SONAR_PROJECT_KEY}
          -Dsonar.organization=${SONAR_ORGANIZATION}
          -Dsonar.junit.reportPaths=target/surefire-reports,target/failsafe-reports

      - name: Upload JUnit XML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-xml-reports
          path: |
            target/surefire-reports/*.xml
            target/failsafe-reports/*.xml
          if-no-files-found: warn

      - name: Upload JaCoCo IT report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-it-report
          path: target/site/jacoco-it
          if-no-files-found: warn
