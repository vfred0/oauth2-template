# ------------------------------------------------------------
# SERVER CONFIG
# ------------------------------------------------------------
server.port=8081
spring.application.name=jwt-demo
spring.main.web-application-type=servlet
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ------------------------------------------------------------
# DATASOURCE + JPA + FLYWAY CONFIG
# ------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/appdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:app}

# HikariCP connection pool
spring.datasource.hikari.pool-name=jwt-demo-pool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ------------------------------------------------------------
# KEYCLOAK CONFIG
# ------------------------------------------------------------
keycloak.realm=my-realm
keycloak.auth-server-url=${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8080}
keycloak.resource-client-id=${KEYCLOAK_RESOURCE_CLIENT_ID}
keycloak.resource-client-secret=${KEYCLOAK_RESOURCE_CLIENT_SECRET}
keycloak.connect-timeout=${KEYCLOAK_CONNECT_TIMEOUT:2s}
keycloak.read-timeout=${KEYCLOAK_READ_TIMEOUT:2s}

# Token & revoke endpoints used by KeycloakAuthService
keycloak.token-url=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/token
keycloak.logout-url=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/logout
keycloak.introspection-url=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/token/introspect

# ------------------------------------------------------------
# RESOURCE SERVER (OPAQUE TOKEN / INTROSPECTION)
# ------------------------------------------------------------
spring.security.oauth2.resourceserver.opaque-token.introspection-uri=${keycloak.introspection-url}
spring.security.oauth2.resourceserver.opaque-token.client-id=${keycloak.resource-client-id}
spring.security.oauth2.resourceserver.opaque-token.client-secret=${keycloak.resource-client-secret}

# ------------------------------------------------------------
# ACTUATOR + PROMETHEUS
# ------------------------------------------------------------
management.endpoints.web.exposure.include=prometheus,health
management.endpoint.prometheus.enabled=true
management.endpoint.health.enabled=true
management.metrics.web.server.request.autotime.enabled=true
management.metrics.web.server.request.autotime.percentiles=0.5,0.95,0.99

# ------------------------------------------------------------
# OBSERVABILITY (OpenTelemetry & Tracing)
# ------------------------------------------------------------
management.tracing.sampling.probability=1.0
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

# ------------------------------------------------------------
# RATE LIMITING (Bucket4j)
# ------------------------------------------------------------

# --- Spring Cache ---
spring.cache.type=jcache
spring.cache.jcache.provider=com.github.benmanes.caffeine.jcache.spi.CaffeineCachingProvider
spring.cache.cache-names[0]=filterConfigCache
spring.cache.cache-names[1]=loginBuckets
spring.cache.cache-names[2]=clientsBuckets
spring.cache.caffeine.spec=maximumSize=1000000,expireAfterAccess=3600s

# --- Enable Bucket4j ---
bucket4j.enabled=true
bucket4j.cache-to-use=jcache
bucket4j.filter-config-caching-enabled=true
bucket4j.filter-config-cache-name=filterConfigCache

# Limit /auth/login for client spring-app: 5 requests per minute
bucket4j.filters[0].id=loginfilter
bucket4j.filters[0].cache-name=loginBuckets
bucket4j.filters[0].filter-method=servlet
bucket4j.filters[0].filter-order=0
bucket4j.filters[0].url=/api/auth/login
bucket4j.filters[0].rate-limits[0].bandwidths[0].capacity=5
bucket4j.filters[0].rate-limits[0].bandwidths[0].refill-capacity=5
bucket4j.filters[0].rate-limits[0].bandwidths[0].time=1
bucket4j.filters[0].rate-limits[0].bandwidths[0].unit=MINUTES
bucket4j.filters[0].rate-limits[0].bandwidths[0].initial-capacity=5
bucket4j.filters[0].rate-limits[0].bandwidths[0].refill-speed=INTERVAL

# Limit /api/clients: 20 requests per minute
bucket4j.filters[1].id=clientsfilter
bucket4j.filters[1].cache-name=clientsBuckets
bucket4j.filters[1].filter-method=servlet
bucket4j.filters[1].filter-order=0
bucket4j.filters[1].url=/api/clients.*
bucket4j.filters[1].rate-limits[0].execute-condition=@securityService.clientId() == 'spring-app'
#bucket4j.filters[1].rate-limits[0].execute-condition=@securityService.username() == 'admin'
bucket4j.filters[1].rate-limits[0].bandwidths[0].capacity=20
bucket4j.filters[1].rate-limits[0].bandwidths[0].refill-capacity=20
bucket4j.filters[1].rate-limits[0].bandwidths[0].time=1
bucket4j.filters[1].rate-limits[0].bandwidths[0].unit=MINUTES
bucket4j.filters[1].rate-limits[0].bandwidths[0].initial-capacity=20
bucket4j.filters[1].rate-limits[0].bandwidths[0].refill-speed=INTERVAL
